<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin NutriChef</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10">

  <!-- Login -->
  <div id="loginPage" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md">
    <h1 class="text-2xl font-bold mb-6">🔐 Admin NutriChef</h1>
    <input id="secret" type="password" placeholder="Mot de passe admin"
      class="w-full border p-2 rounded mb-4">
    <button onclick="login()" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
      Connexion
    </button>
    <p id="error" class="text-red-500 mt-2 hidden">Mot de passe incorrect</p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="max-w-4xl mx-auto hidden">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">Admin NutriChef</h1>
      <button onclick="logout()" class="text-red-500 underline">Déconnexion</button>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-3 gap-4 mb-8"></div>

    <!-- Changer plan -->
    <div class="bg-white p-6 rounded-xl shadow mb-8">
      <h2 class="text-xl font-bold mb-4">Changer le plan d'un user</h2>
      <input id="userId" type="text" placeholder="User ID"
        class="border p-2 rounded w-full mb-3">
      <select id="newPlan" class="border p-2 rounded w-full mb-3">
        <option value="free">Free</option>
        <option value="basic">Basic</option>
        <option value="pro">Pro</option>
      </select>
      <button onclick="setPlan()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Mettre à jour
      </button>
      <p id="planMsg" class="mt-2 text-green-600 hidden">✅ Plan mis à jour!</p>
    </div>

    <!-- Liste users -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4">Tous les utilisateurs</h2>
      <div id="usersList"></div>
    </div>
  </div>

  <script>
    const API = 'https://nutrichef-backend-production.up.railway.app';
    let secret = '';

    if (localStorage.getItem('adminSecret')) {
      secret = localStorage.getItem('adminSecret');
      loadDashboard();
    }

    async function login() {
      secret = document.getElementById('secret').value;
      const res = await fetch(`${API}/api/admin/stats`, {
        headers: { 'x-admin-secret': secret }
      });
      if (res.ok) {
        localStorage.setItem('adminSecret', secret);
        loadDashboard();
      } else {
        document.getElementById('error').classList.remove('hidden');
      }
    }

    async function loadDashboard() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');

      const [stats, users] = await Promise.all([
        fetch(`${API}/api/admin/stats`, { headers: { 'x-admin-secret': secret } }).then(r => r.json()),
        fetch(`${API}/api/admin/users`, { headers: { 'x-admin-secret': secret } }).then(r => r.json()),
      ]);

      document.getElementById('stats').innerHTML = `
        <div class="bg-white p-4 rounded-xl shadow text-center">
          <p class="text-3xl font-bold">${stats.totalUsers}</p>
          <p class="text-gray-500">Total users</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center">
          <p class="text-3xl font-bold">${stats.usage?.recipe || 0}</p>
          <p class="text-gray-500">Recettes générées</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow text-center">
          <p class="text-3xl font-bold">${stats.usage?.chat || 0}</p>
          <p class="text-gray-500">Messages chat</p>
        </div>
      `;

      document.getElementById('usersList').innerHTML = users.map(u => `
        <div class="flex justify-between items-center border-b py-2">
          <span class="font-mono text-sm">${u.user_id}</span>
          <span class="px-2 py-1 rounded text-sm font-bold ${
            u.plan === 'pro' ? 'bg-purple-100 text-purple-700' :
            u.plan === 'basic' ? 'bg-blue-100 text-blue-700' :
            'bg-gray-100 text-gray-600'
          }">${u.plan}</span>
        </div>
      `).join('');
    }

    async function setPlan() {
      const userId = document.getElementById('userId').value;
      const plan = document.getElementById('newPlan').value;
      await fetch(`${API}/api/admin/set-plan`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
        body: JSON.stringify({ userId, plan })
      });
      document.getElementById('planMsg').classList.remove('hidden');
      setTimeout(() => document.getElementById('planMsg').classList.add('hidden'), 3000);
      loadDashboard();
    }

    function logout() {
      localStorage.removeItem('adminSecret');
      location.reload();
    }
  </script>
</body>
</html>
